name: Prewarm Bazaar Cache

on:
  schedule:
    # Note: Scheduled workflows only run from the default branch
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  prewarm:
    runs-on: ubuntu-latest
    steps:
      - name: Prewarm Bazaar categories batch
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
        run: |
          set -e
          # Allow override for testing; fall back to Vercel preview or localhost
          URL=${BASE_URL:-https://www.paltuu.pk}
          echo "Prewarming bazaar cache via $URL/api/bazaar/categories-batch"
          # Try 3 times with small backoff
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --retry 2 --retry-delay 2 "$URL/api/bazaar/categories-batch") || true
            echo "Attempt $i returned status $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Success"
              exit 0
            fi
            sleep $((i * 2))
          done
          echo "Prewarm failed"
          exit 1
